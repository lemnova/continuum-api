# ============================================================================
# SPRING BOOT APPLICATION PROPERTIES - PRODUCAO (MongoDB)                        
# ============================================================================

# -------------------------------------------------------
# MongoDB
# -------------------------------------------------------
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:}

# -------------------------------------------------------
# Servidor e URLs base
# -------------------------------------------------------
server.port=${SERVER_PORT:8080}
app.url=${APP_URL:http://localhost:5173}

# -------------------------------------------------------
# Multipart file upload
# -------------------------------------------------------
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

# -------------------------------------------------------
# JWT
# -------------------------------------------------------
jwt.secret=${JWT_SECRET:}
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
jwt.expiration=${JWT_EXPIRATION:900000}

# -------------------------------------------------------
# Email
# -------------------------------------------------------
resend.api-key=${RESEND_API_KEY:}
email.from=${EMAIL_FROM:noreply@continuum.com}
email.verification.url=${EMAIL_VERIFICATION_URL:${APP_URL}/verify-email}

# -------------------------------------------------------
# Stripe
# -------------------------------------------------------
stripe.api.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

stripe.price-id-plus=${STRIPE_PRICE_ID_PLUS:}
stripe.price-id-pro=${STRIPE_PRICE_ID_PRO:}
stripe.price-id-vision=${STRIPE_PRICE_ID_VISION:}

stripe.price.plus=${STRIPE_PRICE_ID_PLUS:}
stripe.price.pro=${STRIPE_PRICE_ID_PRO:}
stripe.price.gold=${STRIPE_PRICE_ID_VISION:}

stripe.success.url=${STRIPE_SUCCESS_URL:${APP_URL}/subscription/success}
stripe.cancel.url=${STRIPE_CANCEL_URL:${APP_URL}/subscription/cancel}

# -------------------------------------------------------
# Planos (limites; cĂłdigo atual usa PlanLimits, mas Ă© ideal estar aqui para override)
# -------------------------------------------------------
plan.free.max-entities=${PLAN_FREE_MAX_ENTITIES:20}
plan.free.max-notes=${PLAN_FREE_MAX_NOTES:50}
plan.free.max-habits=${PLAN_FREE_MAX_HABITS:3}
plan.free.max-history-days=${PLAN_FREE_MAX_HISTORY_DAYS:30}
plan.free.max-metadata-kb=${PLAN_FREE_MAX_METADATA_KB:10}
plan.free.max-vault-size-mb=${PLAN_FREE_MAX_VAULT_SIZE_MB:100}

plan.plus.max-entities=${PLAN_PLUS_MAX_ENTITIES:100}
plan.plus.max-notes=${PLAN_PLUS_MAX_NOTES:500}
plan.plus.max-habits=${PLAN_PLUS_MAX_HABITS:10}
plan.plus.max-history-days=${PLAN_PLUS_MAX_HISTORY_DAYS:180}
plan.plus.max-metadata-kb=${PLAN_PLUS_MAX_METADATA_KB:50}
plan.plus.max-vault-size-mb=${PLAN_PLUS_MAX_VAULT_SIZE_MB:1024}

plan.pro.max-entities=${PLAN_PRO_MAX_ENTITIES:-1}
plan.pro.max-notes=${PLAN_PRO_MAX_NOTES:-1}
plan.pro.max-habits=${PLAN_PRO_MAX_HABITS:-1}
plan.pro.max-history-days=${PLAN_PRO_MAX_HISTORY_DAYS:730}
plan.pro.max-metadata-kb=${PLAN_PRO_MAX_METADATA_KB:500}
plan.pro.max-vault-size-mb=${PLAN_PRO_MAX_VAULT_SIZE_MB:2048}

plan.gold.max-entities=${PLAN_GOLD_MAX_ENTITIES:-1}
plan.gold.max-notes=${PLAN_GOLD_MAX_NOTES:-1}
plan.gold.max-habits=${PLAN_GOLD_MAX_HABITS:-1}
plan.gold.max-history-days=${PLAN_GOLD_MAX_HISTORY_DAYS:-1}
plan.gold.max-metadata-kb=${PLAN_GOLD_MAX_METADATA_KB:2048}
plan.gold.max-vault-size-mb=${PLAN_GOLD_MAX_VAULT_SIZE_MB:4096}

# -------------------------------------------------------
# CORS / OAuth / Vault B2
# -------------------------------------------------------
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}

vault.b2.endpoint=${VAULT_B2_ENDPOINT:s3.us-east-005.backblazeb2.com}
vault.b2.bucket-name=${VAULT_B2_BUCKET:}
vault.b2.access-key=${VAULT_B2_ACCESS_KEY:}
vault.b2.secret-key=${VAULT_B2_SECRET_KEY:}
vault.b2.region=${VAULT_B2_REGION:us-east-005}

journal.max-content-size=${JOURNAL_MAX_CONTENT_SIZE:1048576}
vault.metadata-cache-ttl=${VAULT_METADATA_CACHE_TTL:300}

# -------------------------------------------------------
# Logging
# -------------------------------------------------------
logging.level.org.springframework.data.jpa=INFO
logging.level.org.hibernate=INFO
logging.level.tech.lemnova.continuum=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springdoc=INFO
logging.level.com.fasterxml.jackson=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# -------------------------------------------------------
# Swagger / OpenAPI
# -------------------------------------------------------
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-login-endpoint=true
